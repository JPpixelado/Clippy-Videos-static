# Workflow para rodar lint e testes no static.py
name: Static Server CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest flask

    - name: Lint static.py with flake8
      run: |
        flake8 static.py --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 static.py --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test static.py with pytest
      run: |
        pytest -q --disable-warnings --maxfail=1
